header { border-bottom: 1px solid #131d35; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #080c18; z-index: 50; }

.sync-err { color: #ef4444; border: 1px solid #7f1d1d; }

.btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 1px; font-weight: 700; transition: all 0.15s; }

table { width: 100%; border-collapse: collapse; font-size: 11px; }

input:focus, select:focus, textarea:focus { outline: none; border-color: #38bdf8; }

        <div><label>REF. MÁX</label><input id="fRefMax" type="number" placeholder="17.5"></div>
        <div class="full"><label>ESTADO</label><select id="fEstado"><option value="normal">Normal</option><option value="alto">Alto</option><option value="bajo">Bajo</option><option value="negativo">Negativo</option><option value="no reactivo">No reactivo</option><option value="indeterminado">Indeterminado</option></select></div>
      </div>
      <div id="infFields" style="display:none" class="full">
        <div style="margin-bottom:10px"><label>HALLAZGOS</label><textarea id="fHallazgos" placeholder="Hallazgos..."></textarea></div>

      <div class="full"><label>NOTAS</label><input id="fNotas" type="text" placeholder="Contexto adicional..."></div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cerrarModal()">CANCELAR</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardar()">GUARDAR</button>

</div>

const { createClient } = supabase;
const sb = createClient(

const INICIALES = [

  {tipo:'inf',nombre:'TC Cavidades Paranasales',categoria:'ORL',clinica:'UC Christus',medico:'Dr. Diego Araneda Castiglioni',fecha:'2026-01-21',hallazgos:'Senos maxilares con engrosamiento mucoso y secreciones. Incurvación del septo nasal de convexidad derecha.',impresion:'Cambios inflamatorios sinusales maxilares.',resultado:'alterado',valor:null,unidad:null,ref_min:null,ref_max:null,estado:null,notas:'Previo a septoplastía marzo 2026.'},

  {tipo:'inf',nombre:'RM Columna Cervical (sin contraste)',categoria:'Imagenología',clinica:'U. de los Andes',medico:'Dr. Dan Dardik',fecha:'2026-04-22',hallazgos:'Cambios degenerativos C3-C4 y C5-C6. Protrusión disco-osteofítica posterolateral-foraminal izquierda C5-C6 con moderada estenosis foraminal y posible compresión raíz C6.',impresion:'Posible escoliosis. Protrusión C5-C6 izquierda con posible compresión raíz C6. Cambios inflamatorios facetarios C3-C6.',resultado:'alterado',valor:null,unidad:null,ref_min:null,ref_max:null,estado:null,notas:''},
  {tipo:'inf',nombre:'EMG Extremidades Superiores (bilateral)',categoria:'Neurología',clinica:'U. de los Andes',medico:'Dra. Olga Reyes',fecha:'2026-04-22',hallazgos:'Conducción sensitiva y motora dentro de límites normales. Amplitud limítrofe en nervio cubital izquierdo.',impresion:'Estudio neurofisiológico de extremidades superiores dentro de límites normales.',resultado:'normal',valor:null,unidad:null,ref_min:null,ref_max:null,estado:null,notas:'Segunda EMG — contraste con estudio Meds 2024.'},
  {tipo:'inf',nombre:'RM Cerebro',categoria:'Imagenología',clinica:'Alemana',medico:'Dr. Patricio Paredes Manzo',fecha:'2026-05-13',hallazgos:'Pequeña lesión cerebelosa derecha sin variación respecto a RM 2023. Mide aprox 6mm. Sin realce.',impresion:'Control de pequeña lesión cerebelosa derecha, probablemente glial de bajo grado, sin variación significativa respecto a RM 2023.',resultado:'en control',valor:null,unidad:null,ref_min:null,ref_max:null,estado:null,notas:'Control Dr. Hoppe Wiegering.'},
  {tipo:'lab',nombre:'Hemograma + VHS + Coagulación',categoria:'Hematología',clinica:'UC Christus',medico:'Dra. Ana María Guzmán D.',fecha:'2026-03-03',valor:'Ver detalle',unidad:'',ref_min:null,ref_max:null,estado:'bajo',hallazgos:null,impresion:null,resultado:null,notas:'Leucocitos 4.0↓ (ref 4.5-11.0). Eosinófilos 1.2%↓. Hemoglobina 14.3 normal. Plaquetas 202 normales. VHS 2 normal.'},
];

const CAT_COLORS = {Neurología:'#38bdf8',Imagenología:'#a78bfa',ORL:'#fb923c',Cardiología:'#f43f5e',Hematología:'#ef4444',Infectología:'#22c55e',Otro:'#64748b'};
let examenes=[], filtCat='Todos', filtCli='Todas', activeTab='lista', tipoActual='lab';

function setSyncStatus(s){
  const el=document.getElementById('syncStatus');
  if(s==='ok'){el.className='sync-status sync-ok';el.textContent='✓ SINCRONIZADO';}
  if(s==='err'){el.className='sync-status sync-err';el.textContent='✗ ERROR';}
  if(s==='loading'){el.className='sync-status sync-loading';el.textContent='⟳ CARGANDO';}
}

async function cargar(){
  setSyncStatus('loading');
  try {
    const {data,error} = await sb.from('examenes').select('*').order('fecha',{ascending:false});
    if(error) throw error;
    if(data.length===0){
      const {error:e2} = await sb.from('examenes').insert(INICIALES);
      if(e2) throw e2;
      const {data:d2} = await sb.from('examenes').select('*').order('fecha',{ascending:false});
      examenes = d2||[];
    } else {
      examenes = data;
    }
    setSyncStatus('ok');
  } catch(e){
    console.error(e);
    setSyncStatus('err');
  }
  document.getElementById('overlay').style.display='none';
  render();
}

async function insertar(ex){
  setSyncStatus('loading');
  const {data,error} = await sb.from('examenes').insert([ex]).select();
  if(error){setSyncStatus('err');alert('Error: '+error.message);return;}
  examenes.unshift(data[0]);
  setSyncStatus('ok');
}

async function borrar(id){
  setSyncStatus('loading');
  const {error} = await sb.from('examenes').delete().eq('id',id);
  if(!error){examenes=examenes.filter(e=>e.id!==id);setSyncStatus('ok');}
  else setSyncStatus('err');
}

function badge(v){
  v=(v||'').toLowerCase().replace(/\s/g,'');
  if(v==='normal')return'<span class="badge badge-normal">NORMAL</span>';
  if(v==='alto')return'<span class="badge badge-alto">ALTO</span>';
  if(v==='bajo')return'<span class="badge badge-bajo">BAJO</span>';
  if(v==='negativo'||v==='noreactivo')return'<span class="badge badge-negativo">'+v.toUpperCase()+'</span>';
  if(v==='alterado'||v==='reactivo')return'<span class="badge badge-alterado">ALTERADO</span>';
  if(v==='encontrol')return'<span class="badge badge-control">EN CONTROL</span>';
  return'<span class="badge badge-indet">—</span>';
}

function fmt(f){return f?f.split('-').reverse().join('/'):'—';}

function getFiltered(){return examenes.filter(e=>(filtCat==='Todos'||e.categoria===filtCat)&&(filtCli==='Todas'||e.clinica===filtCli));}

function render(){
  const total=examenes.length;
  const alter=examenes.filter(e=>['alterado','alto','bajo','reactivo'].includes((e.estado||e.resultado||'').toLowerCase())).length;
  const clins=new Set(examenes.map(e=>e.clinica)).size;
  document.getElementById('sTotal').textContent=total;
  document.getElementById('sAlter').textContent=alter;
  document.getElementById('sClin').textContent=clins;
  document.getElementById('sUlt').textContent=examenes[0]?.fecha?fmt(examenes[0].fecha):'—';
  if(activeTab==='lista')renderLista();else renderTimeline();
}

function renderLista(){
  const data=getFiltered();
  const body=document.getElementById('tablaBody');
  if(!data.length){body.innerHTML='<tr><td colspan="9" class="empty">Sin exámenes</td></tr>';return;}
  body.innerHTML=data.map(ex=>{
    const color=CAT_COLORS[ex.categoria]||'#64748b';
    const tipo=ex.tipo==='lab'?'<span class="type-lab">LAB</span>':'<span class="type-inf">INFORME</span>';
    const res=ex.tipo==='lab'?`${ex.valor||''} <span style="color:#334455;font-size:9px">${ex.unidad||''}</span>`:(ex.impresion||'').slice(0,70)+'…';
    const est=badge(ex.tipo==='lab'?ex.estado:ex.resultado);
    return`<tr onclick="verDetalle(${ex.id})" style="cursor:pointer">
      <td>${tipo}</td><td style="color:#c8d4e8;font-weight:600;max-width:150px">${ex.nombre}</td>
      <td style="color:#7a8aaa;font-size:10px;max-width:200px">${res}</td><td>${est}</td>
      <td><span style="color:${color};font-size:9px">${ex.categoria}</span></td>
      <td style="color:#4a5a7a;font-size:10px">${ex.clinica}</td>
      <td style="color:#334455;font-size:9px">${ex.medico||'—'}</td>
      <td style="color:#4a5a7a;font-size:10px;white-space:nowrap">${fmt(ex.fecha)}</td>
      <td><button class="btn-danger" onclick="event.stopPropagation();eliminar(${ex.id})">×</button></td>
    </tr>`;
  }).join('');
}

function renderTimeline(){
  const data=[...examenes].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  const body=document.getElementById('timelineBody');
  let html='',lastYear='';
  data.forEach(ex=>{
    const year=(ex.fecha||'????').slice(0,4);
    if(year!==lastYear){html+=`<div class="tl-year">${year}</div>`;lastYear=year;}
    const color=CAT_COLORS[ex.categoria]||'#64748b';
    const est=badge(ex.tipo==='lab'?ex.estado:ex.resultado);
    const res=ex.tipo==='lab'?`${ex.valor} ${ex.unidad||''}`:(ex.impresion||'').slice(0,80)+'…';
    html+=`<div class="tl-item" onclick="verDetalle(${ex.id})">
      <div class="tl-dot" style="background:${color}"></div>
      <div style="flex:1">
        <div style="font-size:11px;color:#c8d4e8;font-weight:600">${ex.nombre}</div>
        <div style="font-size:10px;color:#4a5a7a;margin-top:2px">${ex.clinica} · ${fmt(ex.fecha)} · ${ex.medico||''}</div>
        <div style="margin-top:4px">${est} <span style="color:#4a5a7a;font-size:10px;margin-left:6px">${res}</span></div>
      </div>
    </div>`;
  });
  body.innerHTML=html||'<div class="empty">Sin exámenes</div>';
}

function verDetalle(id){
  const ex=examenes.find(e=>e.id===id);if(!ex)return;
  const color=CAT_COLORS[ex.categoria]||'#64748b';
  const est=badge(ex.tipo==='lab'?ex.estado:ex.resultado);
  let html=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div><div style="font-size:15px;color:#fff;font-weight:700;margin-bottom:4px">${ex.nombre}</div>
    <div style="font-size:10px;color:#4a5a7a">${ex.clinica} · ${fmt(ex.fecha)}</div>
    <div style="font-size:10px;color:#334455;margin-top:2px">${ex.medico||''}</div></div>
    <div style="text-align:right">${est}<div style="color:${color};font-size:9px;margin-top:6px">${ex.categoria}</div></div>
  </div>`;
  if(ex.tipo==='lab')html+=`<div style="background:#080c18;border:1px solid #131d35;border-radius:6px;padding:14px;margin-bottom:12px">
    <div style="font-size:26px;font-weight:900;color:#38bdf8">${ex.valor} <span style="font-size:12px;color:#334455">${ex.unidad||''}</span></div>
    ${ex.ref_min!=null&&ex.ref_max!=null?`<div style="font-size:10px;color:#4a5a7a;margin-top:4px">Ref: ${ex.ref_min}–${ex.ref_max} ${ex.unidad||''}</div>`:''}
  </div>`;
  if(ex.hallazgos)html+=`<div style="margin-bottom:12px"><div style="font-size:8px;color:#2a3a5a;letter-spacing:2px;margin-bottom:6px">HALLAZGOS</div><div style="font-size:11px;color:#7a8aaa;line-height:1.7">${ex.hallazgos}</div></div>`;
  if(ex.impresion)html+=`<div style="margin-bottom:12px"><div style="font-size:8px;color:#2a3a5a;letter-spacing:2px;margin-bottom:6px">IMPRESIÓN</div><div style="font-size:11px;color:#c8d4e8;line-height:1.7">${ex.impresion}</div></div>`;
  if(ex.notas)html+=`<div style="margin-bottom:12px"><div style="font-size:8px;color:#2a3a5a;letter-spacing:2px;margin-bottom:6px">NOTAS</div><div style="font-size:11px;color:#5a6a8a">${ex.notas}</div></div>`;
  html+=`<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost" onclick="cerrarDetalle()">CERRAR</button></div>`;
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detailBg').classList.add('open');
}
function cerrarDetalle(){document.getElementById('detailBg').classList.remove('open');}

function abrirModal(){document.getElementById('modalBg').classList.add('open');document.getElementById('fFecha').valueAsDate=new Date();}
function cerrarModal(){document.getElementById('modalBg').classList.remove('open');}
function setTipo(t){
  tipoActual=t;
  document.getElementById('btnLab').classList.toggle('active',t==='lab');
  document.getElementById('btnInf').classList.toggle('active',t==='inf');
  document.getElementById('labFields').style.display=t==='lab'?'contents':'none';
  document.getElementById('infFields').style.display=t==='inf'?'block':'none';
}

async function guardar(){
  const nombre=document.getElementById('fNombre').value.trim();
  if(!nombre){alert('Ingresa el nombre');return;}
  const btn=document.getElementById('btnGuardar');
  btn.textContent='GUARDANDO...';btn.disabled=true;
  const base={tipo:tipoActual,nombre,categoria:document.getElementById('fCategoria').value,clinica:document.getElementById('fClinica').value,medico:document.getElementById('fMedico').value,fecha:document.getElementById('fFecha').value,notas:document.getElementById('fNotas').value};
  if(tipoActual==='lab'){Object.assign(base,{valor:document.getElementById('fValor').value,unidad:document.getElementById('fUnidad').value,ref_min:document.getElementById('fRefMin').value||null,ref_max:document.getElementById('fRefMax').value||null,estado:document.getElementById('fEstado').value,hallazgos:null,impresion:null,resultado:null});}
  else{Object.assign(base,{hallazgos:document.getElementById('fHallazgos').value,impresion:document.getElementById('fImpresion').value,resultado:document.getElementById('fResultado').value,valor:null,unidad:null,ref_min:null,ref_max:null,estado:null});}
  await insertar(base);
  btn.textContent='GUARDAR';btn.disabled=false;
  cerrarModal();limpiar();render();
}

function limpiar(){['fNombre','fValor','fUnidad','fRefMin','fRefMax','fMedico','fNotas','fHallazgos','fImpresion'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});}

async function eliminar(id){if(!confirm('¿Eliminar?'))return;await borrar(id);render();}

function setFCat(v,el){filtCat=v;document.querySelectorAll('.filter-bar .pill').forEach(p=>{if(['TODOS','NEUROLOGÍA','IMAGENOLOGÍA','ORL','CARDIOLOGÍA','HEMATOLOGÍA','INFECTOLOGÍA','OTRO'].includes(p.textContent))p.classList.remove('active');});el.classList.add('active');render();}
function setFCli(v,el){filtCli=v;document.querySelectorAll('.filter-bar .pill').forEach(p=>{if(['TODAS','U. ANDES','MEDS','ALEMANA','UC CHRISTUS'].includes(p.textContent))p.classList.remove('active');});el.classList.add('active');render();}
function setTab(tab,el){activeTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('viewLista').style.display=tab==='lista'?'':'none';document.getElementById('viewTimeline').style.display=tab==='timeline'?'':'none';document.getElementById('filterBar').style.display=tab==='lista'?'flex':'none';render();}
function onFileSelect(e){const file=e.target.files[0];if(!file)return;window.open(URL.createObjectURL(file),'_blank');abrirModal();}

cargar();
</script>
</body>
</html>
