<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salud — Mi Historial</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; background: #080c18; color: #e0e4f0; min-height: 100vh; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #080c18; }
::-webkit-scrollbar-thumb { background: #1e2a4a; border-radius: 2px; }

/* ── LOADING ── */
.loading-overlay { position:fixed;inset:0;background:#080c18;z-index:999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px; }
.spinner { width:28px;height:28px;border:2px solid #1e2a4a;border-top-color:#38bdf8;border-radius:50%;animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:10px;color:#4a5a7a;letter-spacing:2px; }

/* ── AUTH ── */
.auth-screen { display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px; }
.auth-box { background:#0c1220;border:1px solid #1e2a4a;border-radius:12px;padding:36px;width:100%;max-width:380px; }
.auth-logo { font-size:24px;font-weight:900;color:#fff;margin-bottom:4px; }
.auth-logo span { color:#38bdf8; }
.auth-sub { font-size:9px;color:#334455;letter-spacing:3px;margin-bottom:28px; }
.auth-tabs { display:flex;margin-bottom:24px;border-bottom:1px solid #131d35; }
.auth-tab { flex:1;padding:8px;font-size:10px;letter-spacing:1px;cursor:pointer;border:none;background:transparent;color:#5a6a8a;font-family:'Courier New',monospace;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;text-align:center; }
.auth-tab.active { color:#38bdf8;border-bottom-color:#38bdf8; }
.auth-field { margin-bottom:14px;position:relative; }
.auth-field label { font-size:9px;color:#4a5a7a;letter-spacing:1px;display:block;margin-bottom:4px; }
.auth-field input { width:100%;background:#080c18;border:1px solid #1e2a4a;border-radius:6px;padding:10px 36px 10px 12px;color:#e0e4f0;font-family:'Courier New',monospace;font-size:12px; }
.auth-field input:focus { outline:none;border-color:#38bdf8; }
.eye-btn { position:absolute;right:10px;bottom:10px;background:none;border:none;cursor:pointer;color:#2a3a5a;padding:2px;line-height:1;transition:color 0.15s; }
.eye-btn:hover { color:#38bdf8; }
.eye-btn svg { width:16px;height:16px;display:block; }
.auth-btn { width:100%;padding:11px;border-radius:6px;border:none;cursor:pointer;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;font-weight:700;background:#38bdf8;color:#080c18;margin-top:6px;transition:all 0.15s; }
.auth-btn:hover { background:#7dd3fc; }
.auth-btn:disabled { opacity:0.5;cursor:not-allowed; }
.auth-err { font-size:10px;color:#ef4444;margin-top:10px;text-align:center;min-height:16px; }
.auth-ok { color:#22c55e !important; }

/* ── APP ── */
#appScreen { display:none; }
header { border-bottom:1px solid #131d35;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#080c18;z-index:50; }
.logo { font-size:20px;font-weight:900;letter-spacing:-0.5px;color:#fff; }
.logo span { color:#38bdf8; }
.logo-sub { font-size:9px;color:#334455;letter-spacing:3px;margin-top:1px; }
.header-actions { display:flex;gap:8px;align-items:center; }
.sync-status { font-size:9px;letter-spacing:1px;padding:3px 8px;border-radius:100px; }
.sync-ok { color:#22c55e;border:1px solid #166534; }
.sync-err { color:#ef4444;border:1px solid #7f1d1d; }
.sync-loading { color:#f59e0b;border:1px solid #78350f; }
.user-email { font-size:9px;color:#4a5a7a;letter-spacing:1px; }
.btn { padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;font-weight:700;transition:all 0.15s; }
.btn-primary { background:#38bdf8;color:#080c18; }
.btn-primary:hover { background:#7dd3fc; }
.btn-ghost { background:transparent;border:1px solid #1e2a4a;color:#7a8aaa; }
.btn-ghost:hover { border-color:#38bdf8;color:#38bdf8; }
.btn-danger { background:transparent;border:none;color:#2a3a5a;font-size:12px;cursor:pointer;padding:2px 6px; }
.btn-danger:hover { color:#ef4444; }
main { max-width:1100px;margin:0 auto;padding:20px 28px; }
.stats { display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px; }
.stat { background:#0c1220;border:1px solid #131d35;border-radius:8px;padding:12px 16px; }
.stat-label { font-size:8px;color:#334455;letter-spacing:2px;margin-bottom:4px; }
.stat-value { font-size:26px;font-weight:900; }
.tabs { display:flex;margin-bottom:16px;border-bottom:1px solid #131d35; }
.tab { padding:8px 16px;font-size:10px;letter-spacing:1px;cursor:pointer;border:none;background:transparent;color:#5a6a8a;font-family:'Courier New',monospace;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s; }
.tab.active { color:#38bdf8;border-bottom-color:#38bdf8; }
.filter-bar { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center; }
.divider { width:1px;height:18px;background:#131d35;margin:0 2px; }
.pill { cursor:pointer;border:1px solid #1e2a4a;padding:3px 10px;border-radius:100px;font-size:10px;font-family:'Courier New',monospace;background:transparent;color:#5a6a8a;transition:all 0.12s; }
.pill:hover { border-color:#38bdf8;color:#38bdf8; }
.pill.active { background:#38bdf8;color:#080c18;border-color:#38bdf8;font-weight:700; }
.table-wrap { background:#0c1220;border:1px solid #131d35;border-radius:8px;overflow:hidden; }
table { width:100%;border-collapse:collapse;font-size:11px; }
th { padding:9px 12px;text-align:left;font-size:8px;color:#2a3a5a;letter-spacing:1.5px;border-bottom:1px solid #131d35;font-weight:700; }
td { padding:10px 12px;border-bottom:1px solid #0d1728;vertical-align:top; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#0a1020; }
.empty { text-align:center;padding:50px;color:#2a3a5a;font-size:12px; }
.badge { display:inline-block;font-size:8px;padding:2px 7px;border-radius:100px;border:1px solid;letter-spacing:1px;font-weight:700; }
.badge-normal,.badge-negativo { color:#22c55e;border-color:#166534; }
.badge-alto,.badge-alterado { color:#ef4444;border-color:#7f1d1d; }
.badge-bajo { color:#f59e0b;border-color:#78350f; }
.badge-control { color:#94a3b8;border-color:#334155; }
.badge-indet { color:#64748b;border-color:#1e293b; }
.type-lab { color:#38bdf8;font-size:8px;letter-spacing:1px; }
.type-inf { color:#a78bfa;font-size:8px;letter-spacing:1px; }
.pdf-link { color:#38bdf8;font-size:9px;text-decoration:none;border:1px solid #1e2a4a;padding:2px 6px;border-radius:4px; }
.pdf-link:hover { border-color:#38bdf8; }
.modal-bg { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#0c1220;border:1px solid #1e2a4a;border-radius:10px;width:92%;max-width:660px;max-height:90vh;overflow-y:auto;padding:24px; }
.modal h2 { font-size:11px;color:#38bdf8;margin-bottom:18px;letter-spacing:2px; }
.type-select { display:flex;gap:8px;margin-bottom:18px; }
.type-btn { flex:1;padding:10px;border-radius:6px;border:1px solid #1e2a4a;background:transparent;color:#5a6a8a;font-family:'Courier New',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;letter-spacing:1px; }
.type-btn.active { border-color:#38bdf8;color:#38bdf8;background:#0a1828; }
.form-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.full { grid-column:1 / -1; }
label { font-size:9px;color:#4a5a7a;letter-spacing:1px;display:block;margin-bottom:4px; }
input,select,textarea { width:100%;background:#080c18;border:1px solid #1e2a4a;border-radius:6px;padding:8px 10px;color:#e0e4f0;font-family:'Courier New',monospace;font-size:11px; }
input:focus,select:focus,textarea:focus { outline:none;border-color:#38bdf8; }
textarea { resize:vertical;min-height:70px; }
.btn-row { display:flex;gap:8px;justify-content:flex-end;margin-top:16px; }
.upload-zone { border:1px dashed #1e2a4a;border-radius:6px;padding:16px;text-align:center;cursor:pointer;transition:all 0.15s;margin-bottom:4px; }
.upload-zone:hover { border-color:#38bdf8; }
.upload-zone.has-file { border-color:#22c55e;color:#22c55e; }
.tl-item { display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:#0c1220;border:1px solid #131d35;border-radius:6px;cursor:pointer;transition:all 0.12s;margin-bottom:6px; }
.tl-item:hover { border-color:#38bdf8; }
.tl-dot { width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0; }
.tl-year { font-size:9px;color:#2a3a5a;letter-spacing:2px;padding:6px 0 2px;border-top:1px solid #131d35;margin-top:4px; }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="overlay">
  <div class="spinner"></div>
  <div class="loading-text">CARGANDO...</div>
</div>

<!-- AUTH -->
<div class="auth-screen" id="authScreen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">SALUD<span>_</span></div>
    <div class="auth-sub">HISTORIAL MÉDICO PERSONAL</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="setAuthTab('login')">INICIAR SESIÓN</button>
      <button class="auth-tab" id="tabRegister" onclick="setAuthTab('register')">REGISTRARSE</button>
    </div>

    <!-- Login form -->
    <div id="loginForm">
      <div class="auth-field">
        <label>EMAIL</label>
        <input id="loginEmail" type="email" placeholder="tu@email.com" onkeydown="if(event.key==='Enter')login()">
      </div>
      <div class="auth-field">
        <label>CONTRASEÑA</label>
        <input id="loginPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
        <button class="eye-btn" type="button" onclick="toggleEye('loginPass','eyeLogin')" id="eyeLogin" title="Ver contraseña">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button class="auth-btn" id="btnLogin" onclick="login()">ENTRAR</button>
    </div>

    <!-- Register form -->
    <div id="registerForm" style="display:none">
      <div class="auth-field">
        <label>EMAIL</label>
        <input id="regEmail" type="email" placeholder="tu@email.com">
      </div>
      <div class="auth-field">
        <label>CONTRASEÑA</label>
        <input id="regPass" type="password" placeholder="mínimo 6 caracteres">
        <button class="eye-btn" type="button" onclick="toggleEye('regPass','eyeReg')" id="eyeReg" title="Ver contraseña">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="auth-field">
        <label>CONFIRMAR CONTRASEÑA</label>
        <input id="regPass2" type="password" placeholder="repite la contraseña">
      </div>
      <button class="auth-btn" onclick="register()">CREAR CUENTA</button>
    </div>

    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div>
      <div class="logo">SALUD<span>_</span></div>
      <div class="logo-sub">HISTORIAL MÉDICO PERSONAL</div>
    </div>
    <div class="header-actions">
      <span class="sync-status sync-loading" id="syncStatus">⟳ CARGANDO</span>
      <span class="user-email" id="userEmail"></span>
      <button class="btn btn-ghost" onclick="logout()">SALIR</button>
      <button class="btn btn-primary" onclick="abrirModal()">+ AGREGAR EXAMEN</button>
    </div>
  </header>

  <main>
    <div class="stats">
      <div class="stat"><div class="stat-label">TOTAL</div><div class="stat-value" id="sTotal" style="color:#38bdf8">—</div></div>
      <div class="stat"><div class="stat-label">ALTERADOS</div><div class="stat-value" id="sAlter" style="color:#ef4444">—</div></div>
      <div class="stat"><div class="stat-label">CLÍNICAS</div><div class="stat-value" id="sClin" style="color:#a78bfa">—</div></div>
      <div class="stat"><div class="stat-label">ÚLTIMO</div><div class="stat-value" id="sUlt" style="color:#22c55e;font-size:13px;padding-top:6px">—</div></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('lista',this)">LISTA</button>
      <button class="tab" onclick="setTab('timeline',this)">LÍNEA DE TIEMPO</button>
    </div>
    <div class="filter-bar" id="filterBar">
      <!-- Categorías -->
      <button class="pill active" onclick="setFCat('Todos',this)">TODOS</button>
      <button class="pill" onclick="setFCat('Neurología',this)">NEUROLOGÍA</button>
      <button class="pill" onclick="setFCat('Imagenología',this)">IMAGENOLOGÍA</button>
      <button class="pill" onclick="setFCat('ORL',this)">ORL</button>
      <button class="pill" onclick="setFCat('Cardiología',this)">CARDIOLOGÍA</button>
      <button class="pill" onclick="setFCat('Hematología',this)">HEMATOLOGÍA</button>
      <button class="pill" onclick="setFCat('Infectología',this)">INFECTOLOGÍA</button>
      <button class="pill" onclick="setFCat('Otro',this)">OTRO</button>
      <div class="divider"></div>
      <!-- Clínicas — se generan dinámicamente -->
      <div id="clinicPills"></div>
    </div>
    <div id="viewLista">
      <div class="table-wrap">
        <table>
          <thead><tr><th>TIPO</th><th>EXAMEN</th><th>ESTADO</th><th>CATEGORÍA</th><th>CLÍNICA</th><th>FECHA</th><th>PDF</th><th></th></tr></thead>
          <tbody id="tablaBody"><tr><td colspan="8" class="empty">Cargando...</td></tr></tbody>
        </table>
      </div>
    </div>
    <div id="viewTimeline" style="display:none"><div id="timelineBody"></div></div>
  </main>
</div>

<!-- Modal detalle -->
<div class="modal-bg" id="detailBg" onclick="if(event.target===this)cerrarDetalle()">
  <div class="modal" id="detailContent"></div>
</div>

<!-- Modal agregar -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)cerrarModal()">
  <div class="modal">
    <h2>NUEVO EXAMEN</h2>
    <div style="margin-bottom:18px">
      <label>PDF DEL EXAMEN (opcional)</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('pdfInput').click()">
        <div id="uploadText" style="font-size:11px;color:#4a5a7a">⊕ Click para subir PDF</div>
      </div>
      <input type="file" id="pdfInput" accept=".pdf" style="display:none" onchange="onPdfSelect(event)">
    </div>
    <div class="type-select">
      <button class="type-btn active" id="btnLab" onclick="setTipo('lab')">🔬 LABORATORIO</button>
      <button class="type-btn" id="btnInf" onclick="setTipo('inf')">📄 INFORME</button>
    </div>
    <div class="form-grid">
      <div class="full"><label>NOMBRE DEL EXAMEN</label><input id="fNombre" type="text" placeholder="Ej: Hemograma"></div>
      <div><label>CATEGORÍA</label>
        <select id="fCategoria">
          <option>Neurología</option><option>Imagenología</option><option>ORL</option>
          <option>Cardiología</option><option>Hematología</option><option>Infectología</option><option>Otro</option>
        </select>
      </div>
      <div><label>CLÍNICA</label>
        <select id="fClinica">
          <option>U. de los Andes</option><option>Meds</option><option>Alemana</option>
          <option>UC Christus</option><option>Las Condes</option><option>Otra</option>
        </select>
      </div>
      <div><label>MÉDICO</label><input id="fMedico" type="text" placeholder="Dr. Nombre Apellido"></div>
      <div><label>FECHA</label><input id="fFecha" type="date"></div>
      <!-- Lab fields -->
      <div id="labFields" style="display:contents">
        <div><label>VALOR</label><input id="fValor" type="text" placeholder="14.3"></div>
        <div><label>UNIDAD</label><input id="fUnidad" type="text" placeholder="g/dL"></div>
        <div><label>REF. MÍN</label><input id="fRefMin" type="number" placeholder="13.5"></div>
        <div><label>REF. MÁX</label><input id="fRefMax" type="number" placeholder="17.5"></div>
        <div class="full"><label>ESTADO</label>
          <select id="fEstado">
            <option value="normal">Normal</option><option value="alto">Alto</option>
            <option value="bajo">Bajo</option><option value="negativo">Negativo</option>
            <option value="no reactivo">No reactivo</option><option value="indeterminado">Indeterminado</option>
          </select>
        </div>
      </div>
      <!-- Informe fields -->
      <div id="infFields" style="display:none" class="full">
        <div style="margin-bottom:10px"><label>HALLAZGOS</label><textarea id="fHallazgos" placeholder="Hallazgos..."></textarea></div>
        <div style="margin-bottom:10px"><label>IMPRESIÓN</label><textarea id="fImpresion" placeholder="Conclusión..."></textarea></div>
        <div><label>RESULTADO</label>
          <select id="fResultado">
            <option value="normal">Normal</option><option value="alterado">Alterado</option><option value="en control">En control</option>
          </select>
        </div>
      </div>
      <div class="full"><label>LINK DE ESTUDIO (opcional)</label><input id="fLink" type="url" placeholder="https://portal.clinica.cl/..."></div>
      <div class="full"><label>NOTAS</label><input id="fNotas" type="text" placeholder="Contexto adicional..."></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cerrarModal()">CANCELAR</button>
      <button class="btn btn-primary" id="btnGuardar" onclick="guardar()">GUARDAR</button>
    </div>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://jaalqnhekhcaqotgytzd.supabase.co',
  'sb_publishable_pDsjtht8LaPnPYfylLD9Vw_H7vbYdDA'
);

const CAT_COLORS = {Neurología:'#38bdf8',Imagenología:'#a78bfa',ORL:'#fb923c',Cardiología:'#f43f5e',Hematología:'#ef4444',Infectología:'#22c55e',Otro:'#64748b'};
let examenes=[], filtCat='Todos', filtCli='Todas', activeTab='lista', tipoActual='lab', pdfFile=null, currentUser=null;

// ── UTILS ───────────────────────────────────────────────
function toggleEye(inputId, btnId) {
  const input = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

function showAuthErr(msg, ok=false) {
  const el = document.getElementById('authErr');
  el.textContent = msg;
  el.className = ok ? 'auth-err auth-ok' : 'auth-err';
}

// ── AUTH ────────────────────────────────────────────────
function setAuthTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
  document.getElementById('loginForm').style.display = tab==='login' ? '' : 'none';
  document.getElementById('registerForm').style.display = tab==='register' ? '' : 'none';
  showAuthErr('');
}

// ★ FIX PRINCIPAL: después del login exitoso, llamamos mostrarApp() directamente
// sin esperar que onAuthStateChange dispare (no es confiable en producción con Brave/Edge)
async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showAuthErr('Completa todos los campos'); return; }

  const btn = document.getElementById('btnLogin');
  btn.textContent = 'ENTRANDO...';
  btn.disabled = true;
  showAuthErr('');

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  if (error) {
    showAuthErr(error.message);
    btn.textContent = 'ENTRAR';
    btn.disabled = false;
    return;
  }

  // Éxito — llamada directa, no dependemos del listener
  currentUser = data.user;
  mostrarApp();
}

async function register() {
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const pass2 = document.getElementById('regPass2').value;
  if (!email || !pass || !pass2) { showAuthErr('Completa todos los campos'); return; }
  if (pass !== pass2)            { showAuthErr('Las contraseñas no coinciden'); return; }
  if (pass.length < 6)           { showAuthErr('Mínimo 6 caracteres'); return; }

  const { error } = await sb.auth.signUp({ email, password: pass });
  if (error) { showAuthErr(error.message); return; }
  showAuthErr('¡Cuenta creada! Revisa tu email para confirmar.', true);
}

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  examenes = [];
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

// ── SESSION ─────────────────────────────────────────────
function mostrarApp() {
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display  = '';
  document.getElementById('userEmail').textContent = currentUser.email;
  cargar();
}

// Al cargar la página: chequeamos si ya hay sesión activa
sb.auth.getSession().then(({ data: { session } }) => {
  document.getElementById('overlay').style.display = 'none';
  if (session?.user) {
    currentUser = session.user;
    mostrarApp();
  } else {
    document.getElementById('authScreen').style.display = 'flex';
  }
});

// Listener como respaldo (funciona en Chrome normal)
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user && !currentUser) {
    currentUser = session.user;
    document.getElementById('overlay').style.display = 'none';
    mostrarApp();
  }
  if (event === 'SIGNED_OUT') {
    // ya manejado en logout()
  }
});

// ── DATA ────────────────────────────────────────────────
function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  if (s==='ok')      { el.className='sync-status sync-ok';      el.textContent='✓ SINCRONIZADO'; }
  if (s==='err')     { el.className='sync-status sync-err';     el.textContent='✗ ERROR'; }
  if (s==='loading') { el.className='sync-status sync-loading'; el.textContent='⟳ CARGANDO'; }
}

async function cargar() {
  setSyncStatus('loading');
  try {
    const { data, error } = await sb.from('examenes').select('*').order('fecha', { ascending: false });
    if (error) throw error;
    examenes = data || [];
    setSyncStatus('ok');
    renderClinicPills(); // genera los filtros de clínica dinámicamente
  } catch(e) {
    console.error(e);
    setSyncStatus('err');
  }
  render();
}

async function subirPDF(file) {
  const nombre = `${currentUser.id}/${Date.now()}_${file.name.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9._-]/g,"_")}`;
  const { error } = await sb.storage.from('examenes').upload(nombre, file, { contentType: 'application/pdf' });
  if (error) throw error;
  const { data } = sb.storage.from('examenes').getPublicUrl(nombre);
  return data.publicUrl;
}

async function insertar(ex) {
  const { data, error } = await sb.from('examenes').insert([{ ...ex, user_id: currentUser.id }]).select();
  if (error) throw error;
  examenes.unshift(data[0]);
}

async function borrar(id, pdfUrl) {
  if (pdfUrl && pdfUrl.includes('/examenes/')) {
    const path = pdfUrl.split('/object/public/examenes/')[1];
    if (path) await sb.storage.from('examenes').remove([path]);
  }
  await sb.from('examenes').delete().eq('id', id);
  examenes = examenes.filter(e => e.id !== id);
}

// ── HELPERS ─────────────────────────────────────────────
function badge(v) {
  v = (v||'').toLowerCase().replace(/\s/g,'');
  if (v==='normal')                     return '<span class="badge badge-normal">NORMAL</span>';
  if (v==='alto')                       return '<span class="badge badge-alto">ALTO</span>';
  if (v==='bajo')                       return '<span class="badge badge-bajo">BAJO</span>';
  if (v==='negativo'||v==='noreactivo') return '<span class="badge badge-negativo">NEGATIVO</span>';
  if (v==='alterado'||v==='reactivo')   return '<span class="badge badge-alterado">ALTERADO</span>';
  if (v==='encontrol')                  return '<span class="badge badge-control">EN CONTROL</span>';
  return '<span class="badge badge-indet">—</span>';
}
function fmt(f) { return f ? f.split('-').reverse().join('/') : '—'; }
function getFiltered() {
  return examenes.filter(e =>
    (filtCat==='Todos' || e.categoria===filtCat) &&
    (filtCli==='Todas' || e.clinica===filtCli)
  );
}

// ── RENDER ──────────────────────────────────────────────
function renderClinicPills() {
  const clinicas = [...new Set(examenes.map(e => e.clinica).filter(Boolean))].sort();
  const container = document.getElementById('clinicPills');
  let html = '<button class="pill active" id="pillTodas" onclick="setFCli(\'Todas\',this)">TODAS</button>';
  clinicas.forEach(c => {
    html += `<button class="pill" onclick="setFCli('${c}',this)">${c.toUpperCase()}</button>`;
  });
  container.innerHTML = html;
}

function render() {
  const total = examenes.length;
  const alter = examenes.filter(e => ['alterado','alto','bajo','reactivo'].includes((e.estado||e.resultado||'').toLowerCase())).length;
  const clins = new Set(examenes.map(e => e.clinica)).size;
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sAlter').textContent = alter;
  document.getElementById('sClin').textContent  = clins;
  document.getElementById('sUlt').textContent   = examenes[0]?.fecha ? fmt(examenes[0].fecha) : '—';
  if (activeTab==='lista') renderLista();
  else                     renderTimeline();
}

function renderLista() {
  const data = getFiltered();
  const body = document.getElementById('tablaBody');
  if (!data.length) {
    body.innerHTML = '<tr><td colspan="8" class="empty">Sin exámenes. Haz click en "+ AGREGAR EXAMEN" para comenzar.</td></tr>';
    return;
  }
  body.innerHTML = data.map(ex => {
    const color  = CAT_COLORS[ex.categoria] || '#64748b';
    const tipo   = ex.tipo==='lab' ? '<span class="type-lab">LAB</span>' : '<span class="type-inf">INFORME</span>';
    const est    = badge(ex.tipo==='lab' ? ex.estado : ex.resultado);
    const pdfBtn = ex.pdf_url
      ? `<a href="${ex.pdf_url}" target="_blank" class="pdf-link">↗ PDF</a>`
      : ex.link_estudio
        ? `<a href="${ex.link_estudio}" target="_blank" class="pdf-link">↗ ESTUDIO</a>`
        : '—';
    return `<tr onclick="verDetalle(${ex.id})" style="cursor:pointer">
      <td>${tipo}</td>
      <td style="color:#c8d4e8;font-weight:600;max-width:180px">${ex.nombre}</td>
      <td>${est}</td>
      <td><span style="color:${color};font-size:9px">${ex.categoria}</span></td>
      <td style="color:#4a5a7a;font-size:10px">${ex.clinica}</td>
      <td style="color:#4a5a7a;font-size:10px;white-space:nowrap">${fmt(ex.fecha)}</td>
      <td onclick="event.stopPropagation()">${pdfBtn}</td>
      <td><button class="btn-danger" onclick="event.stopPropagation();eliminar(${ex.id},'${ex.pdf_url||''}')">×</button></td>
    </tr>`;
  }).join('');
}

function renderTimeline() {
  const data = [...examenes].sort((a,b) => (b.fecha||'').localeCompare(a.fecha||''));
  const body = document.getElementById('timelineBody');
  let html = '', lastYear = '';
  data.forEach(ex => {
    const year = (ex.fecha||'????').slice(0,4);
    if (year !== lastYear) { html += `<div class="tl-year">${year}</div>`; lastYear = year; }
    const color = CAT_COLORS[ex.categoria] || '#64748b';
    const est   = badge(ex.tipo==='lab' ? ex.estado : ex.resultado);
    const res   = ex.tipo==='lab'
      ? `${ex.valor||''} ${ex.unidad||''}`
      : (ex.impresion||'').slice(0,80) + (ex.impresion?.length > 80 ? '…' : '');
    html += `<div class="tl-item" onclick="verDetalle(${ex.id})">
      <div class="tl-dot" style="background:${color}"></div>
      <div style="flex:1">
        <div style="font-size:11px;color:#c8d4e8;font-weight:600">${ex.nombre}</div>
        <div style="font-size:10px;color:#4a5a7a;margin-top:2px">${ex.clinica} · ${fmt(ex.fecha)}</div>
        <div style="margin-top:4px">${est} <span style="color:#4a5a7a;font-size:10px;margin-left:6px">${res}</span></div>
      </div>
    </div>`;
  });
  body.innerHTML = html || '<div class="empty">Sin exámenes</div>';
}

function verDetalle(id) {
  const ex = examenes.find(e => e.id===id);
  if (!ex) return;
  const color = CAT_COLORS[ex.categoria] || '#64748b';
  const est   = badge(ex.tipo==='lab' ? ex.estado : ex.resultado);
  let html = `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
    <div>
      <div style="font-size:15px;color:#fff;font-weight:700;margin-bottom:4px">${ex.nombre}</div>
      <div style="font-size:10px;color:#4a5a7a">${ex.clinica} · ${fmt(ex.fecha)}</div>
      <div style="font-size:10px;color:#334455;margin-top:2px">${ex.medico||''}</div>
    </div>
    <div style="text-align:right">${est}<div style="color:${color};font-size:9px;margin-top:6px">${ex.categoria}</div></div>
  </div>`;
  if (ex.pdf_url)      html += `<div style="margin-bottom:12px"><a href="${ex.pdf_url}" target="_blank" class="pdf-link" style="font-size:11px;padding:6px 12px">↗ ABRIR PDF</a></div>`;
  if (ex.link_estudio) html += `<div style="margin-bottom:12px"><a href="${ex.link_estudio}" target="_blank" class="pdf-link" style="font-size:11px;padding:6px 12px">↗ VER ESTUDIO DE IMAGEN</a></div>`;
  if (ex.tipo==='lab') html += `<div style="background:#080c18;border:1px solid #131d35;border-radius:6px;padding:14px;margin-bottom:12px">
    <div style="font-size:26px;font-weight:900;color:#38bdf8">${ex.valor||'—'} <span style="font-size:12px;color:#334455">${ex.unidad||''}</span></div>
    ${ex.ref_min!=null && ex.ref_max!=null ? `<div style="font-size:10px;color:#4a5a7a;margin-top:4px">Ref: ${ex.ref_min}–${ex.ref_max} ${ex.unidad||''}</div>` : ''}
  </div>`;
  if (ex.hallazgos) html += `<div style="margin-bottom:12px"><div style="font-size:8px;color:#2a3a5a;letter-spacing:2px;margin-bottom:6px">HALLAZGOS</div><div style="font-size:11px;color:#7a8aaa;line-height:1.7">${ex.hallazgos}</div></div>`;
  if (ex.impresion) html += `<div style="margin-bottom:12px"><div style="font-size:8px;color:#2a3a5a;letter-spacing:2px;margin-bottom:6px">IMPRESIÓN</div><div style="font-size:11px;color:#c8d4e8;line-height:1.7">${ex.impresion}</div></div>`;
  if (ex.notas)     html += `<div style="margin-bottom:12px"><div style="font-size:8px;color:#2a3a5a;letter-spacing:2px;margin-bottom:6px">NOTAS</div><div style="font-size:11px;color:#5a6a8a">${ex.notas}</div></div>`;
  html += `<div style="display:flex;justify-content:flex-end;margin-top:8px"><button class="btn btn-ghost" onclick="cerrarDetalle()">CERRAR</button></div>`;
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailBg').classList.add('open');
}
function cerrarDetalle() { document.getElementById('detailBg').classList.remove('open'); }

function onPdfSelect(e) {
  pdfFile = e.target.files[0];
  if (!pdfFile) return;
  document.getElementById('uploadZone').classList.add('has-file');
  document.getElementById('uploadText').textContent = '✓ ' + pdfFile.name;
}

function abrirModal()  { document.getElementById('modalBg').classList.add('open'); document.getElementById('fFecha').valueAsDate = new Date(); }
function cerrarModal() {
  document.getElementById('modalBg').classList.remove('open');
  pdfFile = null;
  document.getElementById('uploadZone').classList.remove('has-file');
  document.getElementById('uploadText').textContent = '⊕ Click para subir PDF';
  document.getElementById('pdfInput').value = '';
}

function setTipo(t) {
  tipoActual = t;
  document.getElementById('btnLab').classList.toggle('active', t==='lab');
  document.getElementById('btnInf').classList.toggle('active', t==='inf');
  document.getElementById('labFields').style.display = t==='lab' ? 'contents' : 'none';
  document.getElementById('infFields').style.display = t==='inf' ? 'block' : 'none';
}

async function guardar() {
  const nombre = document.getElementById('fNombre').value.trim();
  if (!nombre) { alert('Ingresa el nombre del examen'); return; }
  const btn = document.getElementById('btnGuardar');
  btn.textContent = 'GUARDANDO...'; btn.disabled = true;
  setSyncStatus('loading');
  try {
    let pdfUrl = null;
    if (pdfFile) { btn.textContent = 'SUBIENDO PDF...'; pdfUrl = await subirPDF(pdfFile); }
    const base = {
      tipo: tipoActual, nombre,
      categoria: document.getElementById('fCategoria').value,
      clinica:   document.getElementById('fClinica').value,
      medico:    document.getElementById('fMedico').value,
      fecha:     document.getElementById('fFecha').value,
      notas:     document.getElementById('fNotas').value,
      pdf_url:   pdfUrl,
      link_estudio: document.getElementById('fLink').value || null
    };
    if (tipoActual==='lab') {
      Object.assign(base, {
        valor: document.getElementById('fValor').value,
        unidad: document.getElementById('fUnidad').value,
        ref_min: document.getElementById('fRefMin').value || null,
        ref_max: document.getElementById('fRefMax').value || null,
        estado: document.getElementById('fEstado').value,
        hallazgos: null, impresion: null, resultado: null
      });
    } else {
      Object.assign(base, {
        hallazgos: document.getElementById('fHallazgos').value,
        impresion: document.getElementById('fImpresion').value,
        resultado: document.getElementById('fResultado').value,
        valor: null, unidad: null, ref_min: null, ref_max: null, estado: null
      });
    }
    await insertar(base);
    setSyncStatus('ok'); cerrarModal(); limpiar();
    renderClinicPills(); render();
  } catch(e) {
    console.error(e); setSyncStatus('err'); alert('Error: ' + e.message);
  }
  btn.textContent = 'GUARDAR'; btn.disabled = false;
}

function limpiar() {
  ['fNombre','fValor','fUnidad','fRefMin','fRefMax','fMedico','fNotas','fHallazgos','fImpresion','fLink'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
}

async function eliminar(id, pdfUrl) {
  if (!confirm('¿Eliminar este examen?')) return;
  setSyncStatus('loading');
  try { await borrar(id, pdfUrl); setSyncStatus('ok'); renderClinicPills(); render(); }
  catch(e) { setSyncStatus('err'); }
}

// ── FILTROS ─────────────────────────────────────────────
function setFCat(v, el) {
  filtCat = v;
  document.querySelectorAll('#filterBar > .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setFCli(v, el) {
  filtCli = v;
  document.querySelectorAll('#clinicPills .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('viewLista').style.display    = tab==='lista' ? '' : 'none';
  document.getElementById('viewTimeline').style.display = tab==='timeline' ? '' : 'none';
  document.getElementById('filterBar').style.display    = tab==='lista' ? 'flex' : 'none';
  render();
}
</script>
</body>
</html>
